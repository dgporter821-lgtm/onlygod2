[build]
  command = "npm run build"
  publish = "public"

# Edge Function Configuration
[[edge_functions]]
  function = "relay"
  path = "/*"

# Optional: Cache settings to reduce suspicion
[build.environment]
  NODE_VERSION = "18"

# Simple redirect rules (helps to look more like a normal site)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200